<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orbit — 启动中</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a14; color: #888;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
}
.card { text-align: center; max-width: 400px; }
h1 { font-size: 36px; font-weight: 700; color: #4caf50; letter-spacing: 3px; margin-bottom: 4px; }
.sub { font-size: 13px; color: #555; margin-bottom: 32px; }
.spinner {
  width: 40px; height: 40px; margin: 0 auto 24px;
  border: 3px solid #1a1a2e; border-top-color: #4caf50;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#status { font-size: 14px; margin-bottom: 4px; }
#detail { font-size: 12px; color: #555; }
.bar-outer { width: 200px; height: 4px; background: #1a1a2e; border-radius: 2px; margin: 16px auto 0; overflow: hidden; }
.bar-inner { height: 100%; background: #4caf50; border-radius: 2px; transition: width 0.3s; width: 0%; }
</style>
</head>
<body>
<div class="card">
  <h1>Orbit</h1>
  <p class="sub">Multi-Agent Development System</p>
  <div class="spinner" id="spinner"></div>
  <p id="status">正在等待后端启动...</p><p id="timer" style="font-size:11px;color:#666;margin-top:8px"></p>
  <p id="detail"></p>
  <div class="bar-outer"><div class="bar-inner" id="bar"></div></div><p style="margin-top:12px;font-size:11px"><a href="#" style="color:#4caf50;text-decoration:none" onclick="window.location.href=DASHBOARD;return false">Skip waiting, enter now</a></p>
</div>
<script>
const PROBE = 'http://127.0.0.1:18888/api/v1/observability/startup-probe';
// 直接进 dashboard，跳过 Vue router 的 /boot 二次检查
const DASHBOARD = 'http://127.0.0.1:18888/#/app';
var delay = 1000;
var MAX_WAIT = 30000;
var started = Date.now();

function poll() {
  var req = new XMLHttpRequest();
  req.open('GET', PROBE, true);
  req.timeout = 5000;
  var t0 = Date.now();
  req.onload = function() {
    var tt = Date.now() - t0;
    document.getElementById('detail').textContent = 'HTTP ' + req.status + ' (' + tt + 'ms)';
    try {
      var data = JSON.parse(req.responseText);
      if (!data.data) throw new Error('no data');
      var s = data.data;
      var checks = s.checks || [];
      var done = checks.filter(function(c) { return c.status === 'passed' || c.status === 'repaired' || c.status === 'failed' || c.status === 'skipped'; }).length;
      // 全部完成(8/8)→直接进入, 不等status字段(避免status未及时从running切passed)
      var CRITICAL=["environment","database","agent"]; var critOk=CRITICAL.every(function(n){var c=checks.find(function(x){return x.name===n});return c&&(c.status==="passed"||c.status==="repaired")}); if((critOk&&done>=3)||done===checks.length){
        document.getElementById('status').textContent = '就绪，正在进入...';
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('bar').style.width = '100%';
        setTimeout(function() { window.location.href = DASHBOARD; }, 400);
        return;
      }
      if (s.status === 'passed') {
        document.getElementById('status').textContent = '就绪，正在进入...';
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('bar').style.width = '100%';
        setTimeout(function() { window.location.href = DASHBOARD; }, 400);
        return;
      }
      document.getElementById('status').textContent = '正在检查系统组件 (' + done + '/' + checks.length + ')';
      if (s.elapsed_ms) {
        document.getElementById('detail').textContent = '已耗时 ' + (s.elapsed_ms / 1000).toFixed(1) + 's';
      }
      document.getElementById('bar').style.width = Math.round(done / Math.max(checks.length, 1) * 100) + '%';
      delay = 1000;
    } catch(e) {
      document.getElementById('status').textContent = '正在等待后端就绪...';
      delay = 1500;
    }
  };
  req.onerror = function() {
    document.getElementById('status').textContent = '正在等待后端启动...';
    document.getElementById('detail').textContent = 'Connection failed (port 18888 not reachable)';
    var elapsed = Math.round((Date.now() - started) / 1000);
    document.getElementById('detail').textContent = '已等待 ' + elapsed + 's';
    delay = 1500;
  };
  req.ontimeout = req.onerror;
  var elapsed = Date.now() - started;
      if (elapsed > MAX_WAIT) { window.location.href = DASHBOARD; return; }
      var now = Date.now();
      var remaining = Math.max(0, Math.round((MAX_WAIT - (now - started)) / 1000));
      document.getElementById("timer").textContent = 'Auto-redirect in ' + remaining + 's...';
      if (now - started > MAX_WAIT) { document.getElementById("status").textContent = 'Timeout — entering anyway...'; setTimeout(function() { window.location.href = DASHBOARD; }, 500); return; }
      setTimeout(poll, delay);
  req.send();
}
setTimeout(poll, 1500);
</script>
</body>
</html>
