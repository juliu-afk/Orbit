# MCP 客户端配置——Orbit 连接外部 MCP 服务器
# 每个服务器的工具会自动注册到 ToolRegistry，
# 并加上 "{name}/" 前缀（如 serena/find_symbol）
servers:
  # Serena —— 语义级代码导航与编辑（LSP 后端，40+ 语言）
  - name: serena
    command: serena
    args:
      - "start-mcp-server"
      - "--context"
      - "ide-assistant"
    enabled: false  # 首次启动需下载 LSP (>90s)，手动开启
    timeout_seconds: 30
