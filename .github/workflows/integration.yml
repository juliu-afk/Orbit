# 集成测试：真实 PostgreSQL/Redis 容器 + API 端到端
# 比 unit test 慢，但验证 DB/缓存/序列化在真实环境工作
name: Integration Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: orbit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/orbit_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install "poetry>=2.0"

      - name: Configure Poetry
        run: poetry config virtualenvs.create false

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run integration tests
        # 集成测试标记 integration，单元测试不依赖外部服务
        run: poetry run pytest tests/integration/ -v --tb=short

      - name: Run smoke tests (if exist)
        # E2E 冒烟测试（Playwright 阶段后启用）
        run: |
          if [ -d tests/e2e ] && poetry run pytest tests/e2e/ -k "smoke" --collect-only 2>/dev/null | grep -q "test"; then
            poetry run pytest tests/e2e/ -k "smoke" -v
          else
            echo "No smoke tests found, skipping"
          fi