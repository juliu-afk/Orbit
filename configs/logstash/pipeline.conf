# Logstash 审计日志管道 —— Orbit AgentOps (P2 模板)
# 消费 structlog JSON Lines → 写入 Elasticsearch 索引。
# 待 ELK Stack 部署后启用。

input {
  # 从文件读取 structlog 输出 (JSON Lines 格式)
  file {
    path => "/var/log/orbit/*.log"
    codec => json
    type => "orbit-audit"
  }
  # 或从 stdout 容器日志 (Docker json-file driver)
  # 实际部署时根据日志采集方式选择 input 插件
}

filter {
  # 审计日志字段规范化
  if [type] == "orbit-audit" {
    # 确保时间戳字段统一
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
    # 提取关键字段
    mutate {
      rename => {
        "component" => "[orbit][component]"
        "operation" => "[orbit][operation]"
        "task_id" => "[orbit][task_id]"
        "status" => "[orbit][status]"
      }
    }
  }
}

output {
  # 审计日志 → 独立索引 (永久保留)
  if [type] == "orbit-audit" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "orbit-audit-%{+YYYY.MM.dd}"
      # ILM 策略: 审计日志永久保留，调试日志 7 天后归档
      ilm_enabled => true
      ilm_policy => "orbit-audit-policy"
    }
  }
  # 调试日志 → 独立索引 (7 天 TTL)
  else {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "orbit-debug-%{+YYYY.MM.dd}"
      ilm_policy => "orbit-debug-policy"
    }
  }
}
