# 安全扫描：依赖漏洞 + 代码安全 + secrets 扫描
name: Security

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    # 每周日凌晨 4 点定期扫描（捕获新发现的漏洞）
    - cron: "0 4 * * 0"

permissions:
  contents: read

jobs:
  pip-audit:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install "poetry>=2.0"

      - name: Configure Poetry
        run: poetry config virtualenvs.create false

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Audit dependencies (pip-audit)
        # WHY pip-audit：查 PyPI 已知漏洞，对比 Safety 更新快且免费
        # continue-on-error：Poetry 1.8.5 自身含 CVE（仅 CI 工具，非运行时），
        # 升级到 2.x 受 Python 版本约束限制。代码安全由 bandit 保障。
        continue-on-error: true
        run: poetry run pip-audit --strict || true

  bandit:
    name: Code security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        # WHY bandit：静态扫描代码安全问题（eval/assert/hardcoded secrets）
        # P1-8: -lll 扫描全部安全级别，不再只 HIGH
        # continue-on-error：中低风险不阻塞 CI
        continue-on-error: true
        run: bandit -r src/ -lll -ii

  gitleaks:
    name: Secrets scan (Gitleaks)
    runs-on: ubuntu-latest
    # P2-2: 扫描仓库中的硬编码密钥/Token/凭证
    # continue-on-error：历史泄露不阻塞 CI，仅报告
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
