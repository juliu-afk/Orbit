# 基础设施容器（Step 0.2 ADR）
# PostgreSQL：审计存储（task_audit_trail、成本记录）
# Redis：审计缓存（热点数据、熔断器状态）
# LiteLLM：LLM 统一网关（DeepSeek V4 Pro/Flash + GLM-5.2/4.7 Flash）
services:
  postgres:
    image: postgres:15
    container_name: orbit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orbit}
      # P0-15 (Issue#126): 密码从环境变量读取，禁止硬编码
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orbit_dev_请修改}
      POSTGRES_DB: ${POSTGRES_DB:-orbit}
    ports:
      - "5432:5432"
    volumes:
      - orbit-pg-data:/var/lib/postgresql/data
    healthcheck:
      # P0-1 (PR#131): $$ 转义使 Compose 将变量传给容器——之前硬编码 -U postgres
      # 与 POSTGRES_USER=orbit 不匹配导致 healthcheck 永远失败
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-orbit} -d $${POSTGRES_DB:-orbit}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    container_name: orbit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - orbit-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-v1.40.0-stable
    container_name: orbit-litellm
    restart: unless-stopped
    environment:
      # P0-15 (Issue#126): 密钥从环境变量读取——禁止硬编码
      # P1-3 (PR#131): REPLACE_WITH_YOUR_KEY 无 sk- 前缀, 避免 truffleHog 误报
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-REPLACE_WITH_YOUR_KEY}
      # P1-4 (PR#131): ZAI = 智谱 AI (Zhipu AI) 缩写
      ZAI_API_KEY: ${ZAI_API_KEY:-sk-dummy}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-sk-dummy}
    ports:
      - "4000:4000"
    # WHY 仅 MVP：用内存存储，生产阶段再配 PostgreSQL 持久化（Step 0.2 待定决议）
    command: ["--num_workers", "4", "--port", "4000"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  orbit-pg-data:
  orbit-redis-data: